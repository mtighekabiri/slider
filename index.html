<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eye Tracking Heatmap Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #242837;
    --border: #2e3347;
    --text: #e4e6f0;
    --text-muted: #8b8fa8;
    --accent: #6c5ce7;
    --accent-hover: #7f71ed;
    --danger: #e74c5c;
    --danger-hover: #f05e6e;
    --radius: 10px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    border-right: 1px solid var(--border);
  }

  .toolbar-group:last-child { border-right: none; }

  .toolbar-group label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 6px;
    white-space: nowrap;
  }

  button, .btn {
    background: var(--surface-hover);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    font-family: inherit;
  }

  button:hover { background: #2f3448; border-color: #3e4460; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  button.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  button.primary:hover { background: var(--accent-hover); }

  button.danger {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
  }
  button.danger:hover { background: var(--danger-hover); }

  button.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .icon-btn {
    padding: 7px 10px;
    font-size: 16px;
    min-width: 34px;
    justify-content: center;
  }

  /* Slider controls */
  .slider-control {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .slider-control input[type="range"] {
    width: 90px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .slider-value {
    font-size: 12px;
    color: var(--accent);
    min-width: 32px;
    text-align: center;
    font-weight: 600;
    background: rgba(108, 92, 231, 0.15);
    padding: 2px 6px;
    border-radius: 4px;
  }

  /* Main canvas area */
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
  }

  .canvas-container {
    position: relative;
    box-shadow: var(--shadow);
    border-radius: var(--radius);
    overflow: hidden;
    border: 2px solid var(--border);
    cursor: crosshair;
    max-width: 95vw;
    max-height: calc(100vh - 140px);
  }

  .canvas-container canvas {
    display: block;
    max-width: 95vw;
    max-height: calc(100vh - 140px);
    object-fit: contain;
  }

  #heatCanvas {
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    mix-blend-mode: normal;
  }

  /* Upload overlay */
  .upload-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    width: 600px;
    max-width: 90vw;
    height: 400px;
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    transition: all 0.2s;
  }

  .upload-area:hover, .upload-area.dragover {
    border-color: var(--accent);
    background: rgba(108, 92, 231, 0.05);
  }

  .upload-area .upload-icon {
    font-size: 56px;
    opacity: 0.5;
  }

  .upload-area h2 {
    font-size: 20px;
    font-weight: 600;
  }

  .upload-area p {
    color: var(--text-muted);
    font-size: 14px;
  }

  .upload-area .formats {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface-hover);
    padding: 6px 14px;
    border-radius: 20px;
  }

  #fileInput { display: none; }

  /* Brush preview */
  .brush-preview {
    position: fixed;
    border-radius: 50%;
    border: 2px solid rgba(255, 100, 100, 0.6);
    pointer-events: none;
    z-index: 1000;
    transform: translate(-50%, -50%);
    display: none;
  }

  /* Status bar */
  .status-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 6px 20px;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .status-bar .hint {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .status-bar kbd {
    background: var(--surface-hover);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: inherit;
  }

  /* Dropdown menu */
  .dropdown {
    position: relative;
  }

  .dropdown-menu {
    position: absolute;
    top: 100%;
    left: 0;
    margin-top: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    z-index: 200;
    min-width: 160px;
    padding: 4px;
    display: none;
  }

  .dropdown-menu.open { display: block; }

  .dropdown-menu button {
    width: 100%;
    border: none;
    border-radius: 6px;
    text-align: left;
    padding: 8px 12px;
    background: transparent;
  }

  .dropdown-menu button:hover {
    background: var(--surface-hover);
  }

  /* Opacity toggle */
  .opacity-slider {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Toast notifications */
  .toast {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    box-shadow: var(--shadow);
    z-index: 9999;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Responsive */
  @media (max-width: 900px) {
    header { padding: 10px 12px; }
    .toolbar-group label { display: none; }
    .slider-control input[type="range"] { width: 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">&#x1F525;</div>
    Heatmap Studio
  </div>

  <div class="toolbar" id="toolbar" style="display:none;">
    <!-- Undo / Redo -->
    <div class="toolbar-group">
      <button class="icon-btn" id="undoBtn" title="Undo (Ctrl+Z)" disabled>&#x21A9;</button>
      <button class="icon-btn" id="redoBtn" title="Redo (Ctrl+Y)" disabled>&#x21AA;</button>
    </div>

    <!-- Brush Size -->
    <div class="toolbar-group">
      <label>Brush</label>
      <div class="slider-control">
        <input type="range" id="brushSize" min="10" max="200" value="60">
        <span class="slider-value" id="brushSizeVal">60</span>
      </div>
    </div>

    <!-- Heat Intensity -->
    <div class="toolbar-group">
      <label>Intensity</label>
      <div class="slider-control">
        <input type="range" id="intensity" min="1" max="20" value="5">
        <span class="slider-value" id="intensityVal">5</span>
      </div>
    </div>

    <!-- Heatmap Opacity -->
    <div class="toolbar-group">
      <label>Opacity</label>
      <div class="slider-control">
        <input type="range" id="heatOpacity" min="0" max="100" value="70">
        <span class="slider-value" id="heatOpacityVal">70%</span>
      </div>
    </div>

    <!-- Brush Mode -->
    <div class="toolbar-group">
      <label>Mode</label>
      <button id="modePrecise" class="active" title="Precise brush for detailed work">Precise</button>
      <button id="modeBroad" title="Broad soft brush for large regions">Broad</button>
    </div>

    <!-- Toggle original -->
    <div class="toolbar-group">
      <button id="toggleOriginal" title="Hold to view original image">
        &#x1F441; Original
      </button>
    </div>

    <!-- Clear heatmap -->
    <div class="toolbar-group">
      <button id="clearBtn" class="danger" title="Clear all heatmap data">
        &#x1F5D1; Clear
      </button>
    </div>

    <!-- Download -->
    <div class="toolbar-group">
      <div class="dropdown">
        <button id="downloadBtn" class="primary">
          &#x2B07; Download &#x25BE;
        </button>
        <div class="dropdown-menu" id="downloadMenu">
          <button data-format="png">PNG (lossless)</button>
          <button data-format="jpeg">JPEG (compressed)</button>
          <button data-format="webp">WebP (modern)</button>
          <button data-format="bmp">BMP (uncompressed)</button>
          <button data-format="heatonly">Heatmap Only (PNG)</button>
        </div>
      </div>
    </div>

    <!-- Change image -->
    <div class="toolbar-group">
      <button id="changeImageBtn" title="Upload a different image">
        &#x1F4C2; Change Image
      </button>
    </div>
  </div>
</header>

<main>
  <!-- Upload area -->
  <div class="upload-area" id="uploadArea">
    <div class="upload-icon">&#x1F5BC;</div>
    <h2>Upload an Image</h2>
    <p>Drag & drop or click to select</p>
    <div class="formats">PNG, JPEG, WebP, BMP, GIF, SVG, TIFF</div>
  </div>

  <!-- Canvas workspace -->
  <div class="canvas-container" id="canvasContainer" style="display:none;">
    <canvas id="imageCanvas"></canvas>
    <canvas id="heatCanvas"></canvas>
  </div>
</main>

<div class="status-bar" id="statusBar" style="display:none;">
  <div class="hint">
    <span><kbd>Click + Drag</kbd> Paint heat</span>
    <span><kbd>[ / ]</kbd> Brush size</span>
    <span><kbd>Ctrl+Z</kbd> Undo</span>
    <span><kbd>Ctrl+Y</kbd> Redo</span>
    <span><kbd>Space</kbd> View original</span>
  </div>
  <span id="coordsDisplay">--</span>
</div>

<div class="brush-preview" id="brushPreview"></div>
<div class="toast" id="toast"></div>

<input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp,image/bmp,image/gif,image/svg+xml,image/tiff">

<script>
(() => {
  // DOM refs
  const uploadArea = document.getElementById('uploadArea');
  const fileInput = document.getElementById('fileInput');
  const canvasContainer = document.getElementById('canvasContainer');
  const imageCanvas = document.getElementById('imageCanvas');
  const heatCanvas = document.getElementById('heatCanvas');
  const imgCtx = imageCanvas.getContext('2d');
  const heatCtx = heatCanvas.getContext('2d');
  const toolbar = document.getElementById('toolbar');
  const statusBar = document.getElementById('statusBar');
  const brushPreview = document.getElementById('brushPreview');
  const coordsDisplay = document.getElementById('coordsDisplay');
  const toast = document.getElementById('toast');

  // Controls
  const brushSizeSlider = document.getElementById('brushSize');
  const brushSizeVal = document.getElementById('brushSizeVal');
  const intensitySlider = document.getElementById('intensity');
  const intensityVal = document.getElementById('intensityVal');
  const heatOpacitySlider = document.getElementById('heatOpacity');
  const heatOpacityVal = document.getElementById('heatOpacityVal');
  const undoBtn = document.getElementById('undoBtn');
  const redoBtn = document.getElementById('redoBtn');
  const toggleOriginal = document.getElementById('toggleOriginal');
  const clearBtn = document.getElementById('clearBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const downloadMenu = document.getElementById('downloadMenu');
  const changeImageBtn = document.getElementById('changeImageBtn');
  const modePrecise = document.getElementById('modePrecise');
  const modeBroad = document.getElementById('modeBroad');

  // State
  let brushMode = 'precise'; // 'precise' or 'broad'
  let baseImage = null;
  let painting = false;
  let heatData = null; // Float32Array of accumulated heat values
  let imgWidth = 0;
  let imgHeight = 0;
  let displayScale = 1;
  let undoStack = [];
  let redoStack = [];
  const MAX_UNDO = 30;
  let showingOriginal = false;
  let paintInterval = null;
  let lastMouseX = 0;
  let lastMouseY = 0;

  // Show toast
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  // Upload handling
  uploadArea.addEventListener('click', () => fileInput.click());
  changeImageBtn.addEventListener('click', () => fileInput.click());

  uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
  });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    if (e.dataTransfer.files.length) loadImage(e.dataTransfer.files[0]);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) loadImage(fileInput.files[0]);
    fileInput.value = '';
  });

  function loadImage(file) {
    if (!file.type.startsWith('image/')) {
      showToast('Please select a valid image file');
      return;
    }

    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        baseImage = img;
        initCanvas(img);
        uploadArea.style.display = 'none';
        canvasContainer.style.display = 'block';
        toolbar.style.display = 'flex';
        statusBar.style.display = 'flex';
        showToast('Image loaded — start painting!');
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function initCanvas(img) {
    imgWidth = img.naturalWidth;
    imgHeight = img.naturalHeight;

    // Compute display size fitting viewport
    const maxW = window.innerWidth * 0.92;
    const maxH = window.innerHeight - 160;
    displayScale = Math.min(1, maxW / imgWidth, maxH / imgHeight);

    const dw = Math.round(imgWidth * displayScale);
    const dh = Math.round(imgHeight * displayScale);

    imageCanvas.width = imgWidth;
    imageCanvas.height = imgHeight;
    imageCanvas.style.width = dw + 'px';
    imageCanvas.style.height = dh + 'px';

    heatCanvas.width = imgWidth;
    heatCanvas.height = imgHeight;
    heatCanvas.style.width = dw + 'px';
    heatCanvas.style.height = dh + 'px';

    imgCtx.drawImage(img, 0, 0);

    // Init heat data
    heatData = new Float32Array(imgWidth * imgHeight);
    undoStack = [];
    redoStack = [];
    updateUndoRedoButtons();
    renderHeatmap();
  }

  // Convert mouse event to image coordinates
  function toImageCoords(e) {
    const rect = canvasContainer.getBoundingClientRect();
    const x = (e.clientX - rect.left) / displayScale;
    const y = (e.clientY - rect.top) / displayScale;
    return { x, y };
  }

  // Painting
  canvasContainer.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    e.preventDefault();
    painting = true;
    saveUndoState();
    const pos = toImageCoords(e);
    lastMouseX = pos.x;
    lastMouseY = pos.y;
    applyHeat(pos.x, pos.y);
    renderHeatmap();

    // Continuous painting while held
    paintInterval = setInterval(() => {
      if (painting) {
        applyHeat(lastMouseX, lastMouseY);
        renderHeatmap();
      }
    }, 50);
  });

  canvasContainer.addEventListener('mousemove', (e) => {
    const pos = toImageCoords(e);
    lastMouseX = pos.x;
    lastMouseY = pos.y;

    coordsDisplay.textContent = `${Math.round(pos.x)}, ${Math.round(pos.y)}`;

    if (painting) {
      applyHeat(pos.x, pos.y);
      renderHeatmap();
    }
  });

  window.addEventListener('mouseup', () => {
    if (painting) {
      painting = false;
      clearInterval(paintInterval);
      paintInterval = null;
    }
  });

  // Brush preview follows cursor over canvas
  canvasContainer.addEventListener('mouseenter', () => {
    brushPreview.style.display = 'block';
  });
  canvasContainer.addEventListener('mouseleave', () => {
    brushPreview.style.display = 'none';
  });

  window.addEventListener('mousemove', (e) => {
    const multiplier = brushMode === 'broad' ? 3 : 1;
    const bs = brushSizeSlider.value * displayScale * multiplier;
    brushPreview.style.width = bs + 'px';
    brushPreview.style.height = bs + 'px';
    brushPreview.style.left = e.clientX + 'px';
    brushPreview.style.top = e.clientY + 'px';
  });

  // Apply heat in a circular region
  function applyHeat(cx, cy) {
    const baseRadius = brushSizeSlider.value / 2;
    const strength = intensitySlider.value / 100;

    if (brushMode === 'broad') {
      // Broad mode: 3x radius, cubic falloff for very soft spread
      const radius = baseRadius * 3;
      const r2 = radius * radius;
      const softStrength = strength * 0.4;

      const x0 = Math.max(0, Math.floor(cx - radius));
      const y0 = Math.max(0, Math.floor(cy - radius));
      const x1 = Math.min(imgWidth - 1, Math.ceil(cx + radius));
      const y1 = Math.min(imgHeight - 1, Math.ceil(cy + radius));

      for (let y = y0; y <= y1; y++) {
        for (let x = x0; x <= x1; x++) {
          const dx = x - cx;
          const dy = y - cy;
          const dist2 = dx * dx + dy * dy;
          if (dist2 <= r2) {
            const falloff = 1 - (dist2 / r2);
            const cubic = falloff * falloff * falloff;
            const idx = y * imgWidth + x;
            heatData[idx] = Math.min(1, heatData[idx] + softStrength * cubic);
          }
        }
      }
    } else {
      // Precise mode: exact radius, quadratic falloff
      const radius = baseRadius;
      const r2 = radius * radius;

      const x0 = Math.max(0, Math.floor(cx - radius));
      const y0 = Math.max(0, Math.floor(cy - radius));
      const x1 = Math.min(imgWidth - 1, Math.ceil(cx + radius));
      const y1 = Math.min(imgHeight - 1, Math.ceil(cy + radius));

      for (let y = y0; y <= y1; y++) {
        for (let x = x0; x <= x1; x++) {
          const dx = x - cx;
          const dy = y - cy;
          const dist2 = dx * dx + dy * dy;
          if (dist2 <= r2) {
            const falloff = 1 - (dist2 / r2);
            const gaussian = falloff * falloff;
            const idx = y * imgWidth + x;
            heatData[idx] = Math.min(1, heatData[idx] + strength * gaussian);
          }
        }
      }
    }
  }

  // Render heatmap to canvas
  function renderHeatmap() {
    const opacity = heatOpacitySlider.value / 100;
    heatCtx.clearRect(0, 0, imgWidth, imgHeight);

    if (showingOriginal || opacity === 0) return;

    const imageData = heatCtx.createImageData(imgWidth, imgHeight);
    const pixels = imageData.data;

    for (let i = 0; i < heatData.length; i++) {
      const val = heatData[i];
      if (val <= 0.001) continue;

      const [r, g, b] = heatColor(val);
      const pi = i * 4;
      pixels[pi] = r;
      pixels[pi + 1] = g;
      pixels[pi + 2] = b;
      pixels[pi + 3] = Math.round(val * opacity * 255);
    }

    heatCtx.putImageData(imageData, 0, 0);
  }

  // Color gradient: transparent -> blue -> cyan -> green -> yellow -> red (capped, no white)
  function heatColor(t) {
    t = Math.max(0, Math.min(1, t));

    if (t < 0.2) {
      // blue
      const s = t / 0.2;
      return [0, 0, Math.round(80 + 175 * s)];
    } else if (t < 0.4) {
      // blue -> cyan
      const s = (t - 0.2) / 0.2;
      return [0, Math.round(255 * s), 255];
    } else if (t < 0.55) {
      // cyan -> green
      const s = (t - 0.4) / 0.15;
      return [0, 255, Math.round(255 * (1 - s))];
    } else if (t < 0.75) {
      // green -> yellow
      const s = (t - 0.55) / 0.2;
      return [Math.round(255 * s), 255, 0];
    } else {
      // yellow -> red
      const s = (t - 0.75) / 0.25;
      return [255, Math.round(255 * (1 - s)), 0];
    }
  }

  // Undo / Redo
  function saveUndoState() {
    undoStack.push(new Float32Array(heatData));
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = [];
    updateUndoRedoButtons();
  }

  function undo() {
    if (undoStack.length === 0) return;
    redoStack.push(new Float32Array(heatData));
    heatData = undoStack.pop();
    renderHeatmap();
    updateUndoRedoButtons();
  }

  function redo() {
    if (redoStack.length === 0) return;
    undoStack.push(new Float32Array(heatData));
    heatData = redoStack.pop();
    renderHeatmap();
    updateUndoRedoButtons();
  }

  function updateUndoRedoButtons() {
    undoBtn.disabled = undoStack.length === 0;
    redoBtn.disabled = redoStack.length === 0;
  }

  undoBtn.addEventListener('click', undo);
  redoBtn.addEventListener('click', redo);

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if (!baseImage) return;

    if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
      e.preventDefault();
      undo();
    }
    if ((e.key === 'y' && (e.ctrlKey || e.metaKey)) || (e.key === 'z' && (e.ctrlKey || e.metaKey) && e.shiftKey)) {
      e.preventDefault();
      redo();
    }
    if (e.key === '[') {
      brushSizeSlider.value = Math.max(10, Number(brushSizeSlider.value) - 10);
      brushSizeVal.textContent = brushSizeSlider.value;
    }
    if (e.key === ']') {
      brushSizeSlider.value = Math.min(200, Number(brushSizeSlider.value) + 10);
      brushSizeVal.textContent = brushSizeSlider.value;
    }
    if (e.code === 'Space' && !showingOriginal) {
      e.preventDefault();
      showingOriginal = true;
      heatCanvas.style.display = 'none';
      toggleOriginal.classList.add('active');
    }
  });

  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space' && showingOriginal) {
      showingOriginal = false;
      heatCanvas.style.display = 'block';
      toggleOriginal.classList.remove('active');
    }
  });

  // Slider updates
  brushSizeSlider.addEventListener('input', () => {
    brushSizeVal.textContent = brushSizeSlider.value;
  });
  intensitySlider.addEventListener('input', () => {
    intensityVal.textContent = intensitySlider.value;
  });
  heatOpacitySlider.addEventListener('input', () => {
    heatOpacityVal.textContent = heatOpacitySlider.value + '%';
    renderHeatmap();
  });

  // Brush mode toggle
  modePrecise.addEventListener('click', () => {
    brushMode = 'precise';
    modePrecise.classList.add('active');
    modeBroad.classList.remove('active');
  });
  modeBroad.addEventListener('click', () => {
    brushMode = 'broad';
    modeBroad.classList.add('active');
    modePrecise.classList.remove('active');
  });

  // Toggle original button (hold)
  toggleOriginal.addEventListener('mousedown', () => {
    showingOriginal = true;
    heatCanvas.style.display = 'none';
    toggleOriginal.classList.add('active');
  });
  toggleOriginal.addEventListener('mouseup', () => {
    showingOriginal = false;
    heatCanvas.style.display = 'block';
    toggleOriginal.classList.remove('active');
  });
  toggleOriginal.addEventListener('mouseleave', () => {
    if (showingOriginal) {
      showingOriginal = false;
      heatCanvas.style.display = 'block';
      toggleOriginal.classList.remove('active');
    }
  });

  // Clear
  clearBtn.addEventListener('click', () => {
    if (!heatData) return;
    if (!heatData.some(v => v > 0)) return;
    saveUndoState();
    heatData.fill(0);
    renderHeatmap();
    showToast('Heatmap cleared');
  });

  // Download dropdown
  downloadBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    downloadMenu.classList.toggle('open');
  });

  window.addEventListener('click', () => {
    downloadMenu.classList.remove('open');
  });

  downloadMenu.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const format = btn.dataset.format;
      downloadImage(format);
      downloadMenu.classList.remove('open');
    });
  });

  function downloadImage(format) {
    if (!baseImage) return;

    const exportCanvas = document.createElement('canvas');
    exportCanvas.width = imgWidth;
    exportCanvas.height = imgHeight;
    const ctx = exportCanvas.getContext('2d');

    if (format === 'heatonly') {
      // Just the heatmap on transparent background
      const imageData = ctx.createImageData(imgWidth, imgHeight);
      const pixels = imageData.data;
      const opacity = heatOpacitySlider.value / 100;
      for (let i = 0; i < heatData.length; i++) {
        const val = heatData[i];
        if (val <= 0.001) continue;
        const [r, g, b] = heatColor(val);
        const pi = i * 4;
        pixels[pi] = r;
        pixels[pi + 1] = g;
        pixels[pi + 2] = b;
        pixels[pi + 3] = Math.round(val * opacity * 255);
      }
      ctx.putImageData(imageData, 0, 0);
      doDownload(exportCanvas, 'heatmap-only', 'png');
    } else {
      // Composite: image + heatmap
      ctx.drawImage(baseImage, 0, 0);

      // Draw heatmap on top
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = imgWidth;
      tempCanvas.height = imgHeight;
      const tCtx = tempCanvas.getContext('2d');
      const imageData = tCtx.createImageData(imgWidth, imgHeight);
      const pixels = imageData.data;
      const opacity = heatOpacitySlider.value / 100;
      for (let i = 0; i < heatData.length; i++) {
        const val = heatData[i];
        if (val <= 0.001) continue;
        const [r, g, b] = heatColor(val);
        const pi = i * 4;
        pixels[pi] = r;
        pixels[pi + 1] = g;
        pixels[pi + 2] = b;
        pixels[pi + 3] = Math.round(val * opacity * 255);
      }
      tCtx.putImageData(imageData, 0, 0);
      ctx.drawImage(tempCanvas, 0, 0);

      doDownload(exportCanvas, 'heatmap', format);
    }
  }

  function doDownload(canvas, name, format) {
    let mimeType, ext;
    switch (format) {
      case 'jpeg':
        mimeType = 'image/jpeg'; ext = 'jpg'; break;
      case 'webp':
        mimeType = 'image/webp'; ext = 'webp'; break;
      case 'bmp':
        mimeType = 'image/bmp'; ext = 'bmp'; break;
      default:
        mimeType = 'image/png'; ext = 'png';
    }

    canvas.toBlob((blob) => {
      if (!blob) {
        showToast('Export failed — format may not be supported');
        return;
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${name}.${ext}`;
      a.click();
      URL.revokeObjectURL(url);
      showToast(`Downloaded as ${ext.toUpperCase()}`);
    }, mimeType, 0.92);
  }

  // Window resize
  window.addEventListener('resize', () => {
    if (baseImage) {
      const maxW = window.innerWidth * 0.92;
      const maxH = window.innerHeight - 160;
      displayScale = Math.min(1, maxW / imgWidth, maxH / imgHeight);

      const dw = Math.round(imgWidth * displayScale);
      const dh = Math.round(imgHeight * displayScale);

      imageCanvas.style.width = dw + 'px';
      imageCanvas.style.height = dh + 'px';
      heatCanvas.style.width = dw + 'px';
      heatCanvas.style.height = dh + 'px';
    }
  });

  // Prevent context menu on canvas
  canvasContainer.addEventListener('contextmenu', (e) => e.preventDefault());
})();
</script>
</body>
</html>
